{% extends "base.html" %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-2">
  <ol class="breadcrumb small">
    <li class="breadcrumb-item"><a href="/index.html">Dashboard</a></li>
    <li class="breadcrumb-item"><a href="/ocsp_list.html">OCSP Responders</a></li>
    <li class="breadcrumb-item active" id="breadcrumbCurrent">Details</li>
  </ol>
</nav>
<h4 class="mb-4">OCSP Responder Details</h4>
<div id="responderDetails"><div class="text-muted">Loading…</div></div>
{% endblock %}

{% block scripts %}
<script>
  function getIdFromUrl() { return new URLSearchParams(window.location.search).get('id'); }

  function row(label, value) {
    return `<tr><th class="text-nowrap" style="width:220px">${label}</th><td>${value ?? '—'}</td></tr>`;
  }

  const NONCE_BADGE = {
    optional: '<span class="badge bg-secondary">optional</span>',
    required: '<span class="badge bg-warning text-dark">required</span>',
    disabled: '<span class="badge bg-light text-dark border">disabled</span>',
  };

  function renderResponder(r) {
    const id = getIdFromUrl();
    window._responderName = r.name;

    document.getElementById('responderDetails').innerHTML = `
      <div class="card mb-4">
        <div class="card-header fw-semibold d-flex justify-content-between align-items-center">
          <span><i class="bi bi-shield-check me-2"></i>General</span>
          <div class="d-flex gap-2">
            ${window._isAdmin ? `<a class="btn btn-sm btn-outline-primary" href="/ocsp_editor.html?id=${id}">
              <i class="bi bi-pencil me-1"></i>Edit
            </a>` : ''}
            ${window._isAdmin ? `<button class="btn btn-sm btn-outline-danger" onclick="deleteResponder(${id})">
              <i class="bi bi-trash me-1"></i>Delete
            </button>` : ''}
          </div>
        </div>
        <div class="card-body p-0">
          <table class="table table-sm mb-0"><tbody>
            ${row('ID', r.id)}
            ${row('Name', r.name)}
            ${row('CA', r.ca_name ? `${r.ca_name} <span class="text-muted small">(id=${r.ca_id})</span>` : `<span class="text-muted">id=${r.ca_id}</span>`)}
            ${row('Issuer Key Hash (SKI)', r.issuer_ski ? `<span class="font-monospace small">${r.issuer_ski}</span>` : null)}
            ${row('Responder Certificate', r.cert_subject ? `<span class="font-monospace small">${r.cert_subject}</span>` : null)}
            ${row('Certificate Expires', r.cert_not_after)}
          </tbody></table>
        </div>
      </div>
      <div class="card mb-4">
        <div class="card-header fw-semibold"><i class="bi bi-gear me-2"></i>Response Settings</div>
        <div class="card-body p-0">
          <table class="table table-sm mb-0"><tbody>
            ${row('Response Validity', r.response_validity_hours + ' hours')}
            ${row('Hash Algorithm', `<span class="badge bg-dark font-monospace">${r.hash_algorithm}</span>`)}
            ${row('Nonce Policy', NONCE_BADGE[r.nonce_policy] || r.nonce_policy)}
            ${row('Responder ID Encoding', r.responder_id_encoding === 'name' ? 'By subject name (byName)' : 'By key hash (byKey)')}
            ${row('Include Cert in Response', r.include_cert_in_response
              ? '<span class="badge bg-success">Yes</span>'
              : '<span class="badge bg-secondary">No</span>')}
          </tbody></table>
        </div>
      </div>`;
  }

  async function deleteResponder(id) {
    const name = window._responderName || `Responder #${id}`;
    const ok = await confirmAction(
      `<p>Permanently delete OCSP responder <strong>${name}</strong>?</p>
       <p class="mb-0 text-muted small">The responder certificate and signing key will remain in KeyStorage but the responder will stop serving OCSP responses immediately.</p>`,
      { title: 'Delete OCSP Responder', okLabel: 'Delete', okClass: 'btn-danger' }
    );
    if (!ok) return;

    fetch(`${apiBase}/ocsp/${id}`, { method: 'DELETE' })
      .then(r => { if (!r.ok) return r.json().then(e => { throw new Error(e.description || `HTTP ${r.status}`); }); return r.json(); })
      .then(() => {
        showToast(`OCSP responder <strong>${name}</strong> deleted.`);
        setTimeout(() => { window.location.href = '/ocsp_list.html'; }, 1200);
      })
      .catch(err => showToast(`Delete failed: ${err.message}`, 'danger'));
  }

  function loadResponder() {
    const id = getIdFromUrl();
    if (!id) {
      document.getElementById('responderDetails').innerHTML = '<div class="alert alert-warning">No responder ID provided.</div>';
      return;
    }
    fetch(`${apiBase}/ocsp/${id}`)
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(r => {
        document.getElementById('breadcrumbCurrent').textContent = r.name || 'Details';
        renderResponder(r);
      })
      .catch(err => {
        document.getElementById('responderDetails').innerHTML =
          `<div class="alert alert-danger">Failed to load responder: ${err.message}</div>`;
      });
  }

  window.onload = loadResponder;
</script>
{% endblock %}
