{% extends "base.html" %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-2">
  <ol class="breadcrumb small">
    <li class="breadcrumb-item"><a href="/index.html">Dashboard</a></li>
    <li class="breadcrumb-item active">Templates</li>
  </ol>
</nav>

<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0">Certificate Templates</h4>
  <div class="d-flex gap-2" data-admin-only>
    <button class="btn btn-outline-secondary btn-sm" onclick="openImportModal()">
      <i class="bi bi-upload me-1"></i>Import JSON
    </button>
    <a href="/template_editor.html" class="btn btn-success btn-sm">
      <i class="bi bi-plus-lg me-1"></i>New Template
    </a>
  </div>
</div>

<div class="mb-3">
  <input type="search" class="form-control form-control-sm" id="searchInput"
         placeholder="Filter by name…" oninput="filterTable()">
</div>

<div class="table-responsive">
  <table class="table table-bordered table-hover table-striped align-middle w-100">
    <thead class="table-dark">
      <tr>
        <th style="width:5%">ID</th>
        <th>Name</th>
        <th style="width:16%">Created</th>
        <th style="width:16%">Updated</th>
        <th style="width:12%"></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div id="emptyState" class="d-none text-center py-5 text-muted">
  <i class="bi bi-file-earmark-code" style="font-size:3rem;opacity:.3"></i>
  <p class="mt-2 mb-3">No templates found.</p>
  <a href="/template_editor.html" class="btn btn-success btn-sm" data-admin-only>
    <i class="bi bi-plus-lg me-1"></i>Create your first template
  </a>
</div>
{% endblock %}

{% block modals %}
<div class="modal fade" id="importModal" tabindex="-1" aria-labelledby="importModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="importModalLabel">
          <i class="bi bi-upload me-2"></i>Import Template from JSON
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <ul class="nav nav-tabs mb-3" id="importTabs">
          <li class="nav-item">
            <button class="nav-link active" id="tabFileBtn" onclick="switchTab('file')">
              <i class="bi bi-file-earmark-arrow-up me-1"></i>Upload file
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link" id="tabPasteBtn" onclick="switchTab('paste')">
              <i class="bi bi-clipboard me-1"></i>Paste JSON
            </button>
          </li>
        </ul>
        <div id="tabFile">
          <label class="form-label">Select a <code>.json</code> template file</label>
          <input type="file" class="form-control" id="importFile" accept=".json" onchange="previewImportFile()">
        </div>
        <div id="tabPaste" class="d-none">
          <label class="form-label">Paste template JSON</label>
          <textarea class="form-control font-monospace" id="importPaste" rows="12"
                    placeholder='{ "template_name": "...", ... }'></textarea>
        </div>
        <div id="importError" class="alert alert-danger mt-3 d-none"></div>
        <div id="importPreview" class="alert alert-success mt-3 d-none"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="importConfirmBtn" onclick="confirmImport()">
          <i class="bi bi-upload me-1"></i>Import
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  let _allTemplates = [];
  let _activeTab = 'file';
  let _parsedImport = null;

  async function loadTemplates() {
    try {
      const res = await fetch(`${apiBase}/template`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      _allTemplates = await res.json();
      renderTable(_allTemplates);
    } catch (err) { showToast('Failed to load templates: ' + err.message, 'danger'); }
  }

  function renderTable(templates) {
    const tbody = document.getElementById('tableBody');
    const empty = document.getElementById('emptyState');
    if (!templates.length) { tbody.innerHTML = ''; empty.classList.remove('d-none'); return; }
    empty.classList.add('d-none');
    tbody.innerHTML = templates.map(t => `
      <tr>
        <td>${t.id}</td>
        <td><strong>${t.name}</strong></td>
        <td><small class="text-muted">${t.created_at || '—'}</small></td>
        <td><small class="text-muted">${t.updated_at || '—'}</small></td>
        <td>
          <div class="d-flex gap-1">
            ${window._isAdmin ? `<a class="btn btn-sm btn-outline-primary" href="/template_editor.html?id=${t.id}" title="Edit"><i class="bi bi-pencil"></i></a>` : ''}
            <a class="btn btn-sm btn-outline-secondary" href="${apiBase}/template/${t.id}/export" title="Export JSON" download><i class="bi bi-download"></i></a>
          </div>
        </td>
      </tr>`).join('');
  }

  function filterTable() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    renderTable(q ? _allTemplates.filter(t => t.name.toLowerCase().includes(q)) : _allTemplates);
  }

  function openImportModal() {
    _parsedImport = null;
    document.getElementById('importFile').value = '';
    document.getElementById('importPaste').value = '';
    document.getElementById('importError').classList.add('d-none');
    document.getElementById('importPreview').classList.add('d-none');
    switchTab('file');
    new bootstrap.Modal(document.getElementById('importModal')).show();
  }

  function switchTab(tab) {
    _activeTab = tab;
    document.getElementById('tabFile').classList.toggle('d-none', tab !== 'file');
    document.getElementById('tabPaste').classList.toggle('d-none', tab !== 'paste');
    document.getElementById('tabFileBtn').classList.toggle('active', tab === 'file');
    document.getElementById('tabPasteBtn').classList.toggle('active', tab === 'paste');
    document.getElementById('importError').classList.add('d-none');
    document.getElementById('importPreview').classList.add('d-none');
    _parsedImport = null;
  }

  function showImportError(msg) {
    const el = document.getElementById('importError');
    el.textContent = msg; el.classList.remove('d-none');
    document.getElementById('importPreview').classList.add('d-none');
    _parsedImport = null;
  }

  function showImportPreview(obj) {
    _parsedImport = obj;
    document.getElementById('importError').classList.add('d-none');
    const el = document.getElementById('importPreview');
    el.innerHTML = `<i class="bi bi-check-circle me-1"></i>Ready to import: <strong>${obj.template_name}</strong>
      ${obj.max_validity != null ? `&nbsp;·&nbsp; Max validity: ${obj.max_validity === -1 ? 'Unlimited' : obj.max_validity + ' days'}` : ''}`;
    el.classList.remove('d-none');
  }

  function parseAndValidate(jsonStr) {
    let obj;
    try { obj = JSON.parse(jsonStr); } catch (e) { showImportError('Invalid JSON: ' + e.message); return; }
    if (!obj.template_name) { showImportError('Missing required field: template_name'); return; }
    showImportPreview(obj);
  }

  function previewImportFile() {
    const file = document.getElementById('importFile').files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => parseAndValidate(e.target.result);
    reader.readAsText(file);
  }

  async function confirmImport() {
    if (_activeTab === 'paste') parseAndValidate(document.getElementById('importPaste').value);
    if (!_parsedImport) return;

    const btn = document.getElementById('importConfirmBtn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Importing…';

    try {
      const res = await fetch(`${apiBase}/template`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(_parsedImport)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.description || `HTTP ${res.status}`);
      bootstrap.Modal.getInstance(document.getElementById('importModal')).hide();
      showToast(`Template <strong>${_parsedImport.template_name}</strong> imported successfully.`);
      await loadTemplates();
    } catch (err) { showImportError('Import failed: ' + err.message); }
    finally { btn.disabled = false; btn.innerHTML = '<i class="bi bi-upload me-1"></i>Import'; }
  }

  window.onload = loadTemplates;
</script>
{% endblock %}
