<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CA Certificate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { display: flex; min-height: 100vh; }
    #sidebar {
      width: 220px;
      min-height: 100vh;
      background-color: #212529;
      flex-shrink: 0;
    }
    #sidebar .nav-link {
      color: #adb5bd;
      border-radius: 0.375rem;
    }
    #sidebar .nav-link:hover { color: #fff; background-color: #343a40; }
    #sidebar .nav-link.active { color: #fff; background-color: #0d6efd; }
    #sidebar .sidebar-brand {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #343a40;
    }
    #sidebar .nav-section { color: #6c757d; font-size: 0.7rem; text-transform: uppercase; letter-spacing: .08em; padding: 1rem 1.25rem 0.25rem; }
    #main { flex: 1; min-width: 0; overflow-y: auto; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div id="sidebar" class="d-flex flex-column p-3">
    <div class="sidebar-brand mb-3">
      <i class="bi bi-shield-lock me-2"></i>PyPKI
    </div>
    <ul class="nav flex-column gap-1">
      <li class="nav-item">
        <a href="index.html" class="nav-link">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a href="certificate_list.html" class="nav-link">
          <i class="bi bi-card-list me-2"></i>Certificates
        </a>
      </li>
      <li class="nav-item">
        <a href="certificate_request.html" class="nav-link">
          <i class="bi bi-file-earmark-plus me-2"></i>Request
        </a>
      </li>
      <li class="nav-item">
        <a href="ca_certificate.html" class="nav-link active">
          <i class="bi bi-patch-check me-2"></i>CA Certificate
        </a>
      </li>
      <li class="nav-item">
        <a href="template_list.html" class="nav-link">
          <i class="bi bi-file-earmark-code me-2"></i>Templates
        </a>
      </li>
      <div class="nav-section">KMS</div>
      <li class="nav-item">
        <a href="kms_keygen.html" class="nav-link"><i class="bi bi-key me-2"></i>Key Generation</a>
      </li>
    </ul>
  </div>

  <!-- Main content -->
  <div id="main" class="p-4">
    <h4 class="mb-4">CA Certificate</h4>

    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <label for="caSelect" class="form-label">Certification Authority</label>
        <select id="caSelect" class="form-select"></select>
      </div>
      <div class="col-md-6 align-self-end">
        <button class="btn btn-primary" onclick="fetchCACert()">
          <i class="bi bi-download me-1"></i>Fetch Certificate
        </button>
      </div>
    </div>

    <div id="resultSection" class="d-none">
      <label class="form-label fw-semibold">Certificate PEM</label>
      <textarea id="certOutput" class="form-control font-monospace" rows="14" readonly></textarea>
      <div class="mt-2 d-flex gap-2">
        <button class="btn btn-outline-secondary btn-sm" onclick="copyPem()">
          <i class="bi bi-clipboard me-1"></i>Copy
        </button>
        <button class="btn btn-outline-primary btn-sm" onclick="downloadPem()">
          <i class="bi bi-download me-1"></i>Download PEM
        </button>
      </div>
    </div>

    <div id="errorSection" class="d-none">
      <div class="alert alert-danger" id="errorMsg"></div>
    </div>
  </div>

  <script>
    const apiBase = 'http://127.0.0.1:8080/api';

    async function loadCAs() {
      try {
        const res = await fetch(`${apiBase}/ca`);
        const cas = await res.json();
        const sel = document.getElementById('caSelect');
        cas.forEach(ca => {
          const opt = document.createElement('option');
          opt.value = ca.id;
          opt.textContent = ca.name;
          sel.appendChild(opt);
        });
      } catch (err) {
        showError('Failed to load CA list: ' + err);
      }
    }

    async function fetchCACert() {
      const caId = document.getElementById('caSelect').value;

      document.getElementById('resultSection').classList.add('d-none');
      document.getElementById('errorSection').classList.add('d-none');

      try {
        const res = await fetch(`${apiBase}/ca/${caId}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        if (!data.certificate) throw new Error('No certificate in response');

        document.getElementById('certOutput').value = data.certificate;
        document.getElementById('resultSection').classList.remove('d-none');
      } catch (err) {
        showError('Failed to fetch CA certificate: ' + err.message);
      }
    }

    function copyPem() {
      const pem = document.getElementById('certOutput').value;
      navigator.clipboard.writeText(pem).then(() => alert('Copied to clipboard.'));
    }

    function downloadPem() {
      const pem = document.getElementById('certOutput').value;
      const caName = document.getElementById('caSelect').selectedOptions[0].textContent.replace(/\s+/g, '_');
      const blob = new Blob([pem], { type: 'application/x-pem-file' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${caName}.pem`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function showError(msg) {
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorSection').classList.remove('d-none');
    }

    loadCAs();
  </script>
</body>
</html>
