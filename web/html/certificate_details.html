<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Certificate Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { display: flex; min-height: 100vh; }
    #sidebar {
      width: 220px;
      min-height: 100vh;
      background-color: #212529;
      flex-shrink: 0;
    }
    #sidebar .nav-link {
      color: #adb5bd;
      border-radius: 0.375rem;
    }
    #sidebar .nav-link:hover { color: #fff; background-color: #343a40; }
    #sidebar .nav-link.active { color: #fff; background-color: #0d6efd; }
    #sidebar .sidebar-brand {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #343a40;
    }
    #sidebar .nav-section { color: #6c757d; font-size: 0.7rem; text-transform: uppercase; letter-spacing: .08em; padding: 1rem 1.25rem 0.25rem; }
    #main { flex: 1; overflow-y: auto; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div id="sidebar" class="d-flex flex-column p-3">
    <div class="sidebar-brand mb-3">
      <i class="bi bi-shield-lock me-2"></i>PyPKI
    </div>
    <ul class="nav flex-column gap-1">
      <li class="nav-item">
        <a href="index.html" class="nav-link">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>
      </li>
      <div class="nav-section">Certificates</div>
      <li class="nav-item">
        <a href="certificate_list.html" class="nav-link active">
          <i class="bi bi-card-list me-2"></i>Certificates
        </a>
      </li>
      <li class="nav-item">
        <a href="certificate_request.html" class="nav-link">
          <i class="bi bi-file-earmark-plus me-2"></i>Request
        </a>
      </li>
      <div class="nav-section">Certification Authorities</div>
      <li class="nav-item">
        <a href="cas_and_crls.html" class="nav-link">
          <i class="bi bi-building me-2"></i>CAs & CRL
        </a>
      </li>
      <li class="nav-item">
        <a href="template_list.html" class="nav-link">
          <i class="bi bi-file-earmark-code me-2"></i>Templates
        </a>
      </li>
      <div class="nav-section">KMS</div>
      <li class="nav-item">
        <a href="kms_keygen.html" class="nav-link"><i class="bi bi-key me-2"></i>Key Generation</a>
      </li>
    </ul>
  </div>

  <!-- Main content -->
  <div id="main" class="p-4">
    <div class="mb-3">
      <a href="certificate_list.html" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-chevron-left"></i> Back to list
      </a>
    </div>
    <h4 class="mb-4">Certificate Details</h4>
    <div id="certDetails">
      <div class="text-muted">Loading...</div>
    </div>
  </div>

  <!-- Revoke Modal -->
  <div class="modal fade" id="revokeModal" tabindex="-1" aria-labelledby="revokeModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="revokeModalLabel"><i class="bi bi-x-circle me-2 text-danger"></i>Revoke Certificate</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="text-muted small">This action is irreversible. The certificate will be added to the CRL.</p>
          <label for="revocationReasonSelect" class="form-label fw-semibold">Revocation Reason</label>
          <select id="revocationReasonSelect" class="form-select">
            <option value="0">0 – Unspecified</option>
            <option value="1">1 – Key Compromise</option>
            <option value="2">2 – CA Compromise</option>
            <option value="3">3 – Affiliation Changed</option>
            <option value="4">4 – Superseded</option>
            <option value="5">5 – Cessation of Operation</option>
            <option value="6">6 – Certificate Hold</option>
            <option value="8">8 – Remove From CRL</option>
            <option value="9">9 – Privilege Withdrawn</option>
            <option value="10">10 – AA Compromise</option>
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" id="confirmRevokeBtn">
            <i class="bi bi-x-circle me-1"></i>Revoke
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const REVOCATION_REASONS = {
      0: 'Unspecified',
      1: 'Key Compromise',
      2: 'CA Compromise',
      3: 'Affiliation Changed',
      4: 'Superseded',
      5: 'Cessation of Operation',
      6: 'Certificate Hold',
      8: 'Remove From CRL',
      9: 'Privilege Withdrawn',
      10: 'AA Compromise'
    };

    function getIdFromUrl() {
      return new URLSearchParams(window.location.search).get("id");
    }

    function statusBadge(status) {
      const map = { Active: 'success', Revoked: 'danger', Expired: 'secondary' };
      const cls = map[status] || 'secondary';
      return `<span class="badge bg-${cls}">${status}</span>`;
    }

    function row(label, value) {
      return `
        <tr>
          <th class="text-nowrap" style="width:180px">${label}</th>
          <td>${value}</td>
        </tr>`;
    }

    function renderCertificate(cert) {
      const revocationRows = cert.status === 'Revoked' ? `
        ${row('Revoked At', cert.revoked_at || '—')}
        ${row('Revocation Reason', cert.revocation_reason != null
          ? `<span class="font-monospace">${cert.revocation_reason}</span> – ${REVOCATION_REASONS[cert.revocation_reason] || 'Unknown'}`
          : '—')}
      ` : '';

      const revokeButton = cert.status === 'Active' ? `
        <button class="btn btn-sm btn-danger ms-2" data-bs-toggle="modal" data-bs-target="#revokeModal">
          <i class="bi bi-x-circle me-1"></i>Revoke
        </button>
      ` : '';

      document.getElementById('certDetails').innerHTML = `
        <div class="card mb-4">
          <div class="card-header fw-semibold d-flex justify-content-between align-items-center">
            <span>General</span>
            ${revokeButton}
          </div>
          <div class="card-body p-0">
            <table class="table table-sm mb-0">
              <tbody>
                ${row('ID', cert.id)}
                ${row('Status', statusBadge(cert.status))}
                ${row('CA ID', cert.ca_id)}
                ${row('Template ID', cert.template_id)}
                ${row('Serial Number', `<span class="font-monospace">${cert.serial_number}</span>`)}
                ${row('Subject', cert.subject_name || '—')}
                ${row('Issuer', cert.issuer_name || '—')}
                ${row('Not Before', cert.not_before)}
                ${row('Not After', cert.not_after)}
                ${row('Fingerprint', `<span class="font-monospace small">${cert.fingerprint}</span>`)}
                ${row('Created At', cert.created_at)}
                ${row('Updated At', cert.updated_at)}
                ${revocationRows}
              </tbody>
            </table>
          </div>
        </div>

        <div class="card mb-4">
          <div class="card-header fw-semibold">Public Key</div>
          <div class="card-body p-2">
            <pre class="mb-0 small">${cert.public_key}</pre>
          </div>
        </div>

        <div class="card">
          <div class="card-header fw-semibold d-flex justify-content-between align-items-center">
            Certificate PEM
            <a class="btn btn-sm btn-outline-primary" href="http://127.0.0.1:8080/api/certificate/pem/${cert.id}" target="_blank">
              <i class="bi bi-download"></i> Download
            </a>
          </div>
          <div class="card-body p-2">
            <pre class="mb-0 small">${cert.certificate_data}</pre>
          </div>
        </div>
      `;

      document.getElementById('confirmRevokeBtn').addEventListener('click', () => revokeCertificate(cert.id));
    }

    function revokeCertificate(certId) {
      const reason = parseInt(document.getElementById('revocationReasonSelect').value, 10);
      const btn = document.getElementById('confirmRevokeBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Revoking…';

      fetch(`http://127.0.0.1:8080/api/certificate/revoke/${certId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ revocation_reason: reason })
      })
        .then(r => {
          if (!r.ok) return r.json().then(e => { throw new Error(e.description || `HTTP ${r.status}`); });
          return r.json();
        })
        .then(() => {
          bootstrap.Modal.getInstance(document.getElementById('revokeModal')).hide();
          loadCertificate();
        })
        .catch(err => {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-x-circle me-1"></i>Revoke';
          alert(`Revocation failed: ${err.message}`);
        });
    }

    function loadCertificate() {
      const id = getIdFromUrl();
      if (!id) {
        document.getElementById('certDetails').innerHTML = '<div class="alert alert-warning">No certificate ID provided.</div>';
        return;
      }
      fetch(`http://127.0.0.1:8080/api/certificate/${id}`)
        .then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        })
        .then(renderCertificate)
        .catch(err => {
          document.getElementById('certDetails').innerHTML = `<div class="alert alert-danger">Failed to load certificate: ${err.message}</div>`;
        });
    }

    window.onload = loadCertificate;
  </script>
</body>
</html>
