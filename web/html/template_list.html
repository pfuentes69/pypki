<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Certificate Templates</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { display: flex; min-height: 100vh; }
    #sidebar { width: 220px; min-height: 100vh; background-color: #212529; flex-shrink: 0; }
    #sidebar .nav-link { color: #adb5bd; border-radius: 0.375rem; }
    #sidebar .nav-link:hover { color: #fff; background-color: #343a40; }
    #sidebar .nav-link.active { color: #fff; background-color: #0d6efd; }
    #sidebar .sidebar-brand { color: #fff; font-size: 1.1rem; font-weight: 600; padding: 1rem 1.25rem; border-bottom: 1px solid #343a40; }
    #sidebar .nav-section { color: #6c757d; font-size: 0.7rem; text-transform: uppercase; letter-spacing: .08em; padding: 1rem 1.25rem 0.25rem; }
    #main { flex: 1; min-width: 0; overflow-y: auto; }
  </style>
</head>
<body>

  <div id="sidebar" class="d-flex flex-column p-3">
    <div class="sidebar-brand mb-3"><i class="bi bi-shield-lock me-2"></i>PyPKI</div>
    <ul class="nav flex-column gap-1">
      <li class="nav-item"><a href="index.html" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
      <li class="nav-item"><a href="certificate_list.html" class="nav-link"><i class="bi bi-card-list me-2"></i>Certificates</a></li>
      <li class="nav-item"><a href="certificate_request.html" class="nav-link"><i class="bi bi-file-earmark-plus me-2"></i>Request</a></li>
      <li class="nav-item"><a href="ca_certificate.html" class="nav-link"><i class="bi bi-patch-check me-2"></i>CA Certificate</a></li>
      <li class="nav-item"><a href="template_list.html" class="nav-link active"><i class="bi bi-file-earmark-code me-2"></i>Templates</a></li>
      <div class="nav-section">KMS</div>
      <li class="nav-item"><a href="kms_keygen.html" class="nav-link"><i class="bi bi-key me-2"></i>Key Generation</a></li>
    </ul>
  </div>

  <div id="main" class="p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="mb-0">Certificate Templates</h4>
      <a href="template_editor.html" class="btn btn-success btn-sm">
        <i class="bi bi-plus-lg me-1"></i>New Template
      </a>
    </div>

    <div id="errorSection" class="d-none">
      <div class="alert alert-danger" id="errorMsg"></div>
    </div>

    <div class="table-responsive">
      <table class="table table-bordered table-hover table-striped align-middle w-100">
        <thead class="table-dark">
          <tr>
            <th style="width:5%">ID</th>
            <th>Name</th>
            <th style="width:18%">Created At</th>
            <th style="width:18%">Updated At</th>
            <th style="width:6%"></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const apiBase = 'http://127.0.0.1:8080/api';

    async function loadTemplates() {
      try {
        const res = await fetch(`${apiBase}/template`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const templates = await res.json();

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        templates.forEach(t => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${t.id}</td>
            <td>${t.name}</td>
            <td><small>${t.created_at || '—'}</small></td>
            <td><small>${t.updated_at || '—'}</small></td>
            <td><a class="btn btn-sm btn-outline-primary" href="template_editor.html?id=${t.id}">
              <i class="bi bi-pencil"></i> Edit
            </a></td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        document.getElementById('errorMsg').textContent = 'Failed to load templates: ' + err.message;
        document.getElementById('errorSection').classList.remove('d-none');
      }
    }

    window.onload = loadTemplates;
  </script>
</body>
</html>
