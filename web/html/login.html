<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PyPKI – Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { width: 100%; max-width: 380px; }
    .brand-icon { font-size: 2.5rem; color: #0d6efd; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="text-center mb-4">
      <i class="bi bi-shield-lock brand-icon"></i>
      <h4 class="mt-2 fw-bold">PyPKI</h4>
      <p class="text-muted small">Sign in to continue</p>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <div class="mb-3">
          <label class="form-label fw-semibold small">Username</label>
          <input type="text" class="form-control" id="username" autocomplete="username"
                 autofocus>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold small">Password</label>
          <div class="input-group">
            <input type="password" class="form-control" id="password" autocomplete="current-password">
            <button class="btn btn-outline-secondary" type="button" onclick="toggleVis()">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <div id="errorBox" class="alert alert-danger py-2 small" style="display:none"></div>

        <button class="btn btn-primary w-100" id="btnLogin" onclick="doLogin()">
          <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="auth.js"></script>
  <script>
    const apiBase = window._auth.API_BASE;

    // If already logged in, go to dashboard
    if (window._auth.getToken()) {
      window.location.href = 'index.html';
    }

    document.getElementById('password').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doLogin();
    });

    function toggleVis() {
      const inp  = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        inp.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errBox   = document.getElementById('errorBox');
      const btn      = document.getElementById('btnLogin');

      errBox.style.display = 'none';

      if (!username || !password) {
        errBox.textContent = 'Please enter username and password.';
        errBox.style.display = '';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Signing in…';

      try {
        // Use _origFetch to bypass our auth.js monkey-patch (no token yet)
        const res = await fetch(apiBase + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          errBox.textContent = data.error || 'Login failed.';
          errBox.style.display = '';
          return;
        }
        window._auth.setToken(data.token);
        window.location.href = 'index.html';
      } catch (e) {
        errBox.textContent = 'Could not reach the server.';
        errBox.style.display = '';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i>Sign In';
      }
    }
  </script>
</body>
</html>
