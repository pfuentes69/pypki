<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Certificate List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { display: flex; min-height: 100vh; }
    #sidebar {
      width: 220px;
      min-height: 100vh;
      background-color: #212529;
      flex-shrink: 0;
    }
    #sidebar .nav-link {
      color: #adb5bd;
      border-radius: 0.375rem;
    }
    #sidebar .nav-link:hover { color: #fff; background-color: #343a40; }
    #sidebar .nav-link.active { color: #fff; background-color: #0d6efd; }
    #sidebar .sidebar-brand {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #343a40;
    }
    #sidebar .nav-section { color: #6c757d; font-size: 0.7rem; text-transform: uppercase; letter-spacing: .08em; padding: 1rem 1.25rem 0.25rem; }
    #main { flex: 1; min-width: 0; overflow-y: auto; }
    .col-serial { width: 8%; }
    .col-subject { width: auto; }
    .col-date { width: 10%; white-space: nowrap; }
    .col-narrow { width: 5%; }
    .col-status { width: 7%; }
    .col-action { width: 5%; }
    .truncate { max-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div id="sidebar" class="d-flex flex-column p-3">
    <div class="sidebar-brand mb-3">
      <i class="bi bi-shield-lock me-2"></i>PyPKI
    </div>
    <ul class="nav flex-column gap-1">
      <li class="nav-item">
        <a href="index.html" class="nav-link">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a href="certificate_list.html" class="nav-link active">
          <i class="bi bi-card-list me-2"></i>Certificates
        </a>
      </li>
      <li class="nav-item">
        <a href="certificate_request.html" class="nav-link">
          <i class="bi bi-file-earmark-plus me-2"></i>Request
        </a>
      </li>
      <li class="nav-item">
        <a href="ca_certificate.html" class="nav-link">
          <i class="bi bi-patch-check me-2"></i>CA Certificate
        </a>
      </li>
      <li class="nav-item">
        <a href="template_list.html" class="nav-link">
          <i class="bi bi-file-earmark-code me-2"></i>Templates
        </a>
      </li>
      <div class="nav-section">KMS</div>
      <li class="nav-item">
        <a href="kms_keygen.html" class="nav-link"><i class="bi bi-key me-2"></i>Key Generation</a>
      </li>
    </ul>
  </div>

  <!-- Main content -->
  <div id="main" class="p-4">
    <h4 class="mb-4">Certificates</h4>

    <form class="row g-3 mb-4">
      <div class="col-md-4">
        <label for="filterCaId" class="form-label">CA:</label>
        <select class="form-select" id="filterCaId">
          <option value="">All</option>
        </select>
      </div>
      <div class="col-md-4">
        <label for="filterTemplateId" class="form-label">Template:</label>
        <select class="form-select" id="filterTemplateId">
          <option value="">All</option>
        </select>
      </div>
      <div class="col-md-4 align-self-end">
        <button type="button" class="btn btn-primary" onclick="loadCertificates()">Filter</button>
      </div>
    </form>

    <div class="table-responsive">
    <table class="table table-bordered table-hover table-striped align-middle w-100">
      <thead class="table-dark">
        <tr>
          <th class="col-narrow">ID</th>
          <th class="col-narrow">CA</th>
          <th class="col-narrow">Tmpl</th>
          <th class="col-serial">Serial Number</th>
          <th class="col-subject">Subject Name</th>
          <th class="col-date">Not Before</th>
          <th class="col-date">Not After</th>
          <th class="col-status">Status</th>
          <th class="col-action"></th>
        </tr>
      </thead>
      <tbody id="certTableBody"></tbody>
    </table>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-3">
      <button class="btn btn-outline-secondary" onclick="prevPage()">
        <i class="bi bi-chevron-left"></i> Previous
      </button>
      <span class="text-muted" id="pageIndicator">Page 1</span>
      <button class="btn btn-outline-secondary" onclick="nextPage()">
        Next <i class="bi bi-chevron-right"></i>
      </button>
    </div>
  </div>

  <script>
    let currentPage = 1;
    const perPage = 10;

    function loadDropdowns() {
      fetch('http://127.0.0.1:8080/api/ca')
        .then(r => r.json())
        .then(cas => {
          const sel = document.getElementById('filterCaId');
          cas.forEach(ca => {
            const opt = document.createElement('option');
            opt.value = ca.id;
            opt.textContent = ca.name;
            sel.appendChild(opt);
          });
        });

      fetch('http://127.0.0.1:8080/api/template')
        .then(r => r.json())
        .then(templates => {
          const sel = document.getElementById('filterTemplateId');
          templates.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t.id;
            opt.textContent = t.name;
            sel.appendChild(opt);
          });
        });
    }

    function statusBadge(status) {
      const map = { Active: 'success', Revoked: 'danger', Expired: 'secondary' };
      const cls = map[status] || 'secondary';
      return `<span class="badge bg-${cls}">${status}</span>`;
    }

    function loadCertificates() {
      const caId = document.getElementById('filterCaId').value;
      const templateId = document.getElementById('filterTemplateId').value;

      let url = `http://127.0.0.1:8080/api/certificate?page=${currentPage}&per_page=${perPage}`;
      if (caId) url += `&ca_id=${caId}`;
      if (templateId) url += `&template_id=${templateId}`;

      fetch(url)
        .then(r => r.json())
        .then(data => {
          const tbody = document.getElementById('certTableBody');
          tbody.innerHTML = '';
          data.certificates.forEach(cert => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td class="col-narrow">${cert.id}</td>
              <td class="col-narrow">${cert.ca_id}</td>
              <td class="col-narrow">${cert.template_id}</td>
              <td class="col-serial truncate" title="${cert.serial_number}"><small class="font-monospace">${cert.serial_number}</small></td>
              <td class="col-subject truncate" title="${cert.subject_name || ''}">${cert.subject_name || ''}</td>
              <td class="col-date"><small>${cert.not_before}</small></td>
              <td class="col-date"><small>${cert.not_after}</small></td>
              <td class="col-status">${statusBadge(cert.status)}</td>
              <td class="col-action"><a class="btn btn-sm btn-outline-primary" href="certificate_details.html?id=${cert.id}">View</a></td>
            `;
            tbody.appendChild(tr);
          });
          document.getElementById('pageIndicator').innerText = `Page ${currentPage}`;
        })
        .catch(err => {
          console.error('Error fetching certificates:', err);
        });
    }

    function nextPage() { currentPage++; loadCertificates(); }
    function prevPage() { if (currentPage > 1) { currentPage--; loadCertificates(); } }

    window.onload = () => { loadDropdowns(); loadCertificates(); };
  </script>
</body>
</html>
