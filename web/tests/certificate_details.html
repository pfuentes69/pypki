<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Certificate Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { display: flex; min-height: 100vh; }
    #sidebar {
      width: 220px;
      min-height: 100vh;
      background-color: #212529;
      flex-shrink: 0;
    }
    #sidebar .nav-link {
      color: #adb5bd;
      border-radius: 0.375rem;
    }
    #sidebar .nav-link:hover { color: #fff; background-color: #343a40; }
    #sidebar .nav-link.active { color: #fff; background-color: #0d6efd; }
    #sidebar .sidebar-brand {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #343a40;
    }
    #main { flex: 1; overflow-y: auto; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div id="sidebar" class="d-flex flex-column p-3">
    <div class="sidebar-brand mb-3">
      <i class="bi bi-shield-lock me-2"></i>PyPKI
    </div>
    <ul class="nav flex-column gap-1">
      <li class="nav-item">
        <a href="certificate_list.html" class="nav-link active">
          <i class="bi bi-card-list me-2"></i>Certificates
        </a>
      </li>
      <li class="nav-item">
        <a href="certificate_request.html" class="nav-link">
          <i class="bi bi-file-earmark-plus me-2"></i>Request
        </a>
      </li>
      <li class="nav-item">
        <a href="ca_certificate.html" class="nav-link">
          <i class="bi bi-patch-check me-2"></i>CA Certificate
        </a>
      </li>
      <li class="nav-item">
        <a href="template_list.html" class="nav-link">
          <i class="bi bi-file-earmark-code me-2"></i>Templates
        </a>
      </li>
    </ul>
  </div>

  <!-- Main content -->
  <div id="main" class="p-4">
    <div class="mb-3">
      <a href="certificate_list.html" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-chevron-left"></i> Back to list
      </a>
    </div>
    <h4 class="mb-4">Certificate Details</h4>
    <div id="certDetails">
      <div class="text-muted">Loading...</div>
    </div>
  </div>

  <script>
    function getIdFromUrl() {
      return new URLSearchParams(window.location.search).get("id");
    }

    function statusBadge(status) {
      const map = { Active: 'success', Revoked: 'danger', Expired: 'secondary' };
      const cls = map[status] || 'secondary';
      return `<span class="badge bg-${cls}">${status}</span>`;
    }

    function row(label, value) {
      return `
        <tr>
          <th class="text-nowrap" style="width:180px">${label}</th>
          <td>${value}</td>
        </tr>`;
    }

    function renderCertificate(cert) {
      document.getElementById('certDetails').innerHTML = `
        <div class="card mb-4">
          <div class="card-header fw-semibold">General</div>
          <div class="card-body p-0">
            <table class="table table-sm mb-0">
              <tbody>
                ${row('ID', cert.id)}
                ${row('Status', statusBadge(cert.status))}
                ${row('CA ID', cert.ca_id)}
                ${row('Template ID', cert.template_id)}
                ${row('Serial Number', `<span class="font-monospace">${cert.serial_number}</span>`)}
                ${row('Subject', cert.subject_name || '—')}
                ${row('Issuer', cert.issuer_name || '—')}
                ${row('Not Before', cert.not_before)}
                ${row('Not After', cert.not_after)}
                ${row('Fingerprint', `<span class="font-monospace small">${cert.fingerprint}</span>`)}
                ${row('Created At', cert.created_at)}
                ${row('Updated At', cert.updated_at)}
              </tbody>
            </table>
          </div>
        </div>

        <div class="card mb-4">
          <div class="card-header fw-semibold">Public Key</div>
          <div class="card-body p-2">
            <pre class="mb-0 small">${cert.public_key}</pre>
          </div>
        </div>

        <div class="card">
          <div class="card-header fw-semibold d-flex justify-content-between align-items-center">
            Certificate PEM
            <a class="btn btn-sm btn-outline-primary" href="http://127.0.0.1:8080/api/certificate/pem/${cert.id}" target="_blank">
              <i class="bi bi-download"></i> Download
            </a>
          </div>
          <div class="card-body p-2">
            <pre class="mb-0 small">${cert.certificate_data}</pre>
          </div>
        </div>
      `;
    }

    function loadCertificate() {
      const id = getIdFromUrl();
      if (!id) {
        document.getElementById('certDetails').innerHTML = '<div class="alert alert-warning">No certificate ID provided.</div>';
        return;
      }
      fetch(`http://127.0.0.1:8080/api/certificate/${id}`)
        .then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        })
        .then(renderCertificate)
        .catch(err => {
          document.getElementById('certDetails').innerHTML = `<div class="alert alert-danger">Failed to load certificate: ${err.message}</div>`;
        });
    }

    window.onload = loadCertificate;
  </script>
</body>
</html>
